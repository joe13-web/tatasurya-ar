<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tata Surya AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #050520;
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Bintang latar belakang */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.2; }
      100% { opacity: 1; }
    }

    /* Konten utama */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* Logo & Judul */
    .logo-area {
      text-align: center;
      margin-bottom: 40px;
    }

    .planet-icon {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #4fc3f7, #0d47a1);
      margin: 0 auto 15px;
      position: relative;
      box-shadow: 0 0 30px rgba(79, 195, 247, 0.5);
      animation: rotate-planet 10s linear infinite;
    }

    .planet-icon::after {
      content: '';
      position: absolute;
      top: 50%;
      left: -25%;
      width: 150%;
      height: 18px;
      background: rgba(255,200,80,0.35);
      border-radius: 50%;
      transform: translateY(-50%) rotateX(75deg);
    }

    @keyframes rotate-planet {
      from { box-shadow: 0 0 30px rgba(79,195,247,0.5); }
      50% { box-shadow: 0 0 50px rgba(79,195,247,0.9); }
      to { box-shadow: 0 0 30px rgba(79,195,247,0.5); }
    }

    .logo-area h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #f0c040;
      text-shadow: 0 0 20px rgba(240,192,64,0.6);
    }

    .logo-area p {
      font-size: 13px;
      color: #aaaacc;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* Tombol Menu */
    .menu-wrapper {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn-menu {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 22px;
      font-size: 16px;
      font-weight: 600;
      border: 1px solid rgba(100, 120, 255, 0.4);
      border-radius: 14px;
      cursor: pointer;
      background: rgba(20, 20, 80, 0.7);
      color: white;
      transition: all 0.25s ease;
      text-decoration: none;
      backdrop-filter: blur(6px);
    }

    .btn-menu:hover {
      background: rgba(60, 60, 180, 0.8);
      border-color: rgba(150, 170, 255, 0.7);
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 6px 20px rgba(80, 100, 255, 0.3);
    }

    .btn-menu:active {
      transform: scale(0.98);
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .icon-ar   { background: rgba(79, 195, 247, 0.2); }
    .icon-kuis { background: rgba(255, 200, 80, 0.2); }
    .icon-ptj  { background: rgba(100, 220, 140, 0.2); }
    .icon-ttg  { background: rgba(200, 120, 255, 0.2); }

    .btn-text { text-align: left; }
    .btn-text span { display: block; font-size: 12px; color: #aaaacc; font-weight: 400; }

    /* Footer */
    .footer {
      margin-top: auto;
      padding-top: 30px;
      font-size: 12px;
      color: #555577;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Latar bintang -->
  <div class="stars" id="stars"></div>

  <div class="container">
    <div class="logo-area">
      <div class="planet-icon"></div>
      <h1>TATA SURYA</h1>
      <p>Media Edukasi Augmented Reality</p>
    </div>

    <div class="menu-wrapper">
      <a class="btn-menu" href="ar.html">
        <div class="btn-icon icon-ar">📷</div>
        <div class="btn-text">
          Kamera AR
          <span>Scan marker planet 3D</span>
        </div>
      </a>

      <a class="btn-menu" href="kuis.html">
        <div class="btn-icon icon-kuis">📝</div>
        <div class="btn-text">
          Kuis
          <span>Uji pemahamanmu</span>
        </div>
      </a>

      <a class="btn-menu" href="petunjuk.html">
        <div class="btn-icon icon-ptj">📖</div>
        <div class="btn-text">
          Petunjuk
          <span>Cara menggunakan aplikasi</span>
        </div>
      </a>

      <a class="btn-menu" href="tentang.html">
        <div class="btn-icon icon-ttg">ℹ️</div>
        <div class="btn-text">
          Tentang
          <span>Informasi aplikasi</span>
        </div>
      </a>
    </div>

    <div class="footer">
      SDK Assumpta Kupang &mdash; 2025
    </div>
  </div>

  <script>
    // Buat bintang acak di latar belakang
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      star.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        top: ${Math.random() * 100}%;
        left: ${Math.random() * 100}%;
        animation-delay: ${Math.random() * 3}s;
        animation-duration: ${2 + Math.random() * 3}s;
      `;
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
